name: link-watch
# Compiles + links a watchOS app from Swift source using Apple's toolchain (arm64e ptrauth
# needs Apple's compiler, not just linker). The source arrives as an ENCRYPTED, base64 input
# and is decrypted with a shared secret — it's never readable in this public repo, and there's
# no tailnet round-trip, so the run is fast.
on:
  workflow_dispatch:
    inputs:
      src_b64:
        description: "base64(openssl-aes-256-cbc(source tarball)) — encrypted, tiny"
        required: true
      product:
        description: "Executable name to produce"
        required: true
      deployment:
        description: "watchOS deployment target"
        default: "26.0"
jobs:
  build:
    runs-on: macos-latest
    env:
      SRC_KEY: ${{ secrets.SRC_KEY }}
    steps:
      - name: Checkout (for the placeholder app icon)
        uses: actions/checkout@v4
      - name: Decrypt source
        run: |
          mkdir src
          printf '%s' "${{ inputs.src_b64 }}" | base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass env:SRC_KEY \
            | tar xzf - -C src
          echo "sources:"; find src -name '*.swift'
      - name: Compile + link arm64e watchOS app (Apple toolchain)
        run: |
          xcrun --sdk watchos swiftc \
            -target arm64e-apple-watchos${{ inputs.deployment }} \
            -parse-as-library -O \
            $(find src -name '*.swift') \
            -Xlinker -rpath -Xlinker @executable_path/Frameworks \
            -Xlinker -rpath -Xlinker @executable_path/../../Frameworks \
            -o "${{ inputs.product }}"
          file "${{ inputs.product }}"
      - name: Icon fingerprint
        id: icon
        run: |
          if [ -d src/AppIcon.xcassets ]; then
            H=$(find src/AppIcon.xcassets -type f | sort | xargs shasum -a 256 | shasum -a 256 | cut -c1-40)
            echo "custom=true" >> "$GITHUB_OUTPUT"
            echo "hash=$H" >> "$GITHUB_OUTPUT"
          else
            echo "custom=false" >> "$GITHUB_OUTPUT"
            echo "hash=placeholder" >> "$GITHUB_OUTPUT"
          fi
      - name: Restore compiled icon (skip actool if the icon is unchanged)
        if: steps.icon.outputs.custom == 'true'
        uses: actions/cache@v4
        with:
          path: iconout
          key: watch-icon-${{ steps.icon.outputs.hash }}
      - name: App icon
        run: |
          mkdir -p out
          if [ "${{ steps.icon.outputs.custom }}" = "true" ]; then
            if [ -f iconout/Assets.car ]; then
              echo "icon cache HIT (${{ steps.icon.outputs.hash }}) — skipping actool"
            else
              echo "icon changed — compiling with actool"
              mkdir -p iconout
              actool src/AppIcon.xcassets --compile iconout --platform watchos \
                --minimum-deployment-target "${{ inputs.deployment }}" \
                --app-icon AppIcon --output-partial-info-plist iconout/icon-info.plist
            fi
            cp iconout/Assets.car out/; cp iconout/icon-info.plist out/
          else
            # no custom icon — use the committed pre-compiled placeholder
            cp prebuilt-icon/Assets.car out/; cp prebuilt-icon/icon-info.plist out/
          fi
          ls -la out
      - name: Bundle outputs
        run: |
          mkdir -p bundle && mv "${{ inputs.product }}" bundle/
          [ -f out/Assets.car ] && cp out/Assets.car bundle/ || true
          [ -f out/icon-info.plist ] && cp out/icon-info.plist bundle/ || true
          ls -la bundle
      - name: Return built binary + assets
        uses: actions/upload-artifact@v4
        with:
          name: watch-binary
          path: bundle/
          retention-days: 1
