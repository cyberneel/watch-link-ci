name: link-watch
# Compiles + links a watchOS app from Swift source using Apple's toolchain (arm64e ptrauth
# needs Apple's compiler, not just linker). The source arrives as an ENCRYPTED, base64 input
# and is decrypted with a shared secret — it's never readable in this public repo, and there's
# no tailnet round-trip, so the run is fast.
on:
  workflow_dispatch:
    inputs:
      src_b64:
        description: "base64(openssl-aes-256-cbc(source tarball)) — encrypted, tiny"
        required: true
      product:
        description: "Executable name to produce"
        required: true
      deployment:
        description: "watchOS deployment target"
        default: "26.0"
jobs:
  build:
    runs-on: macos-latest
    env:
      SRC_KEY: ${{ secrets.SRC_KEY }}
    steps:
      - name: Decrypt source
        run: |
          mkdir src
          printf '%s' "${{ inputs.src_b64 }}" | base64 -d \
            | openssl enc -d -aes-256-cbc -pbkdf2 -pass env:SRC_KEY \
            | tar xzf - -C src
          echo "sources:"; find src -name '*.swift'
      - name: Compile + link arm64e watchOS app (Apple toolchain)
        run: |
          xcrun --sdk watchos swiftc \
            -target arm64e-apple-watchos${{ inputs.deployment }} \
            -parse-as-library -O \
            $(find src -name '*.swift') \
            -Xlinker -rpath -Xlinker @executable_path/Frameworks \
            -Xlinker -rpath -Xlinker @executable_path/../../Frameworks \
            -o "${{ inputs.product }}"
          file "${{ inputs.product }}"
      - name: Compile app icon (actool)
        run: |
          mkdir -p out
          if [ -d src/AppIcon.xcassets ]; then
            actool src/AppIcon.xcassets --compile out --platform watchos \
              --minimum-deployment-target "${{ inputs.deployment }}" \
              --app-icon AppIcon --output-partial-info-plist out/icon-info.plist
            echo "icon compiled:"; ls -la out
          fi
      - name: Bundle outputs
        run: |
          mkdir -p bundle && mv "${{ inputs.product }}" bundle/
          [ -f out/Assets.car ] && cp out/Assets.car bundle/ || true
          [ -f out/icon-info.plist ] && cp out/icon-info.plist bundle/ || true
          ls -la bundle
      - name: Return built binary + assets
        uses: actions/upload-artifact@v4
        with:
          name: watch-binary
          path: bundle/
          retention-days: 1
