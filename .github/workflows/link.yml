name: link-watch
# Links Linux-compiled arm64e watchOS objects using Xcode's linker (arm64e ptrauth
# needs Apple's ld, which the open-source lld lacks). Objects are pulled over the
# tailnet from the dev box; they never touch GitHub. Only the linked binary is returned.
on:
  workflow_dispatch:
    inputs:
      objects_url:
        description: "Tailnet HTTPS URL of the objects tarball"
        required: true
      product:
        description: "Executable name to produce"
        required: true
      deployment:
        description: "watchOS deployment target"
        default: "26.0"
      box_ip:
        description: "Tailnet IP of the dev box (for /etc/hosts, since MagicDNS may not resolve on the runner)"
        required: true
jobs:
  link:
    runs-on: macos-latest
    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
      - name: Pull objects from dev box (tailnet only)
        run: |
          HOST=$(printf '%s' "${{ inputs.objects_url }}" | sed -E 's#https?://([^/]+)/.*#\1#')
          echo "${{ inputs.box_ip }} $HOST" | sudo tee -a /etc/hosts
          curl -fL --retry 8 --retry-connrefused "${{ inputs.objects_url }}" -o objects.tar.gz
          mkdir objs && tar xzf objects.tar.gz -C objs
          echo "objects:"; find objs -name '*.o'
      - name: Link arm64e watchOS executable
        run: |
          SDK=$(xcrun --sdk watchos --show-sdk-path)
          xcrun --sdk watchos swiftc \
            -target arm64e-apple-watchos${{ inputs.deployment }} \
            $(find objs -name '*.o') \
            -Xlinker -rpath -Xlinker @executable_path/Frameworks \
            -Xlinker -rpath -Xlinker @executable_path/../../Frameworks \
            -o "${{ inputs.product }}"
          file "${{ inputs.product }}"
      - name: Compile app icon (actool)
        run: |
          mkdir -p out
          if [ -d objs/AppIcon.xcassets ]; then
            actool objs/AppIcon.xcassets --compile out --platform watchos \
              --minimum-deployment-target "${{ inputs.deployment }}" \
              --app-icon AppIcon --output-partial-info-plist out/icon-info.plist
            echo "icon compiled:"; ls -la out
          else
            echo "no AppIcon.xcassets provided; skipping icon"
          fi
      - name: Bundle outputs
        run: |
          mkdir -p bundle && mv "${{ inputs.product }}" bundle/
          [ -f out/Assets.car ] && cp out/Assets.car bundle/ || true
          [ -f out/icon-info.plist ] && cp out/icon-info.plist bundle/ || true
          ls -la bundle
      - name: Return linked binary + assets
        uses: actions/upload-artifact@v4
        with:
          name: watch-binary
          path: bundle/
          retention-days: 1
